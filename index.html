<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#4F46E5">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="借贷记账">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>借贷记账</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部导航 -->
    <header id="app-header">
      <h1 class="header-title">借贷记账</h1>
      <nav class="header-tabs">
        <button class="tab-btn active" data-tab="records">流水</button>
        <button class="tab-btn" data-tab="contacts">联系人</button>
        <button class="tab-btn" data-tab="stats">统计</button>
      </nav>
    </header>

    <!-- 汇总卡片 -->
    <div id="summary-bar">
      <div class="summary-item">
        <span class="summary-label">总借出</span>
        <span class="summary-value" id="sum-lend">¥0</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <span class="summary-label">已还款</span>
        <span class="summary-value summary-repay" id="sum-repay">¥0</span>
      </div>
      <div class="summary-divider"></div>
      <div class="summary-item">
        <span class="summary-label">待还款</span>
        <span class="summary-value summary-owing" id="sum-owing">¥0</span>
      </div>
    </div>

    <!-- 筛选标签（流水页） -->
    <div id="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="lend">借出</button>
      <button class="filter-btn" data-filter="repay">还款</button>
    </div>

    <!-- 备份提醒 -->
    <div id="backup-banner" class="backup-banner hidden">
      <span>⚠️ 已 <b id="backup-days">7</b> 天未备份数据</span>
      <button id="backup-now" class="backup-btn">立即备份</button>
    </div>

    <!-- ===== 流水列表 ===== -->
    <main id="view-records" class="view active">
      <div id="record-list">
        <div class="empty-state">
          <div class="empty-icon">📒</div>
          <p>还没有记录</p>
          <p class="empty-hint">点击底部按钮添加第一笔</p>
        </div>
      </div>
    </main>

    <!-- ===== 联系人列表 ===== -->
    <main id="view-contacts" class="view">
      <div id="contact-list">
        <div class="empty-state">
          <div class="empty-icon">👤</div>
          <p>还没有联系人</p>
        </div>
      </div>
    </main>

    <!-- ===== 统计 ===== -->
    <main id="view-stats" class="view">
      <div class="stats-section">
        <h3 class="section-title">月度总览</h3>
        <div id="monthly-stats"></div>
      </div>
    </main>

    <!-- 底部操作按钮 -->
    <div id="fab-container">
      <button class="fab fab-lend" id="btn-lend">借出</button>
      <button class="fab fab-repay" id="btn-repay">还款</button>
      <button class="fab-menu" id="btn-menu" title="更多">⋮</button>
    </div>

    <!-- 更多菜单 -->
    <div id="menu-popup" class="popup-menu hidden">
      <button class="menu-item" id="menu-export">📥 导出 CSV</button>
    </div>
  </div>

  <!-- ===== 添加记录弹窗 ===== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-add" class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title" id="modal-title">记录借出</h2>
      <form id="form-add" autocomplete="off">
        <div class="form-group">
          <label class="form-label">姓名</label>
          <div class="name-input-wrap">
            <input type="text" id="input-name" class="form-input" placeholder="输入姓名" list="name-suggestions" required>
            <datalist id="name-suggestions"></datalist>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">金额</label>
          <input type="number" id="input-amount" class="form-input" placeholder="0.00" step="0.01" min="0.01" required inputmode="decimal">
        </div>
        <div class="form-row">
          <div class="form-group form-group-half">
            <label class="form-label">日期</label>
            <input type="date" id="input-date" class="form-input" required>
          </div>
          <div class="form-group form-group-half">
            <label class="form-label">时间</label>
            <input type="time" id="input-time" class="form-input" required>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">备注 <span class="form-optional">选填</span></label>
          <input type="text" id="input-note" class="form-input" placeholder="比如：买材料、吃饭">
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-cancel" id="btn-cancel">取消</button>
          <button type="submit" class="btn btn-submit" id="btn-submit">确认借出</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ===== 借条预览弹窗 ===== -->
  <div id="iou-overlay" class="modal-overlay hidden">
    <div id="iou-modal" class="modal-sheet">
      <div class="modal-handle"></div>
      <h2 class="modal-title">📄 借条</h2>
      <div id="iou-preview">
        <canvas id="iou-canvas"></canvas>
      </div>
      <div class="form-actions" style="margin-top: 16px;">
        <button type="button" class="btn btn-cancel" id="iou-close">关闭</button>
        <button type="button" class="btn btn-submit" id="iou-download">💾 保存图片</button>
      </div>
    </div>
  </div>

  <!-- ===== Toast 提示 ===== -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
